<!DOCTYPE html>
<html>
<head>
    <title>Ethiopian TIN Extractor</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="card">
    <div class="logo">🇪🇹</div>
    <h1>Ethiopian TIN Extractor</h1>
    <div class="subtitle">
        Extract Mobile Numbers and Establishment Phones from ERCA TIN Data
    </div>

    <div class="stats">
        <div class="stat">
            <div class="stat-value">500+</div>
            <div class="stat-label">TIN Supported</div>
        </div>
        <div class="stat">
            <div class="stat-value">CSV</div>
            <div class="stat-label">Export Format</div>
        </div>
        <div class="stat">
            <div class="stat-value">⚡</div>
            <div class="stat-label">Fast Processing</div>
        </div>
    </div>

    <div class="progress-container" id="progressContainer">
        <div class="progress-status">
            <span id="statusText">Processing...</span>
            <span id="progressPercent">0%</span>
        </div>
        <div class="current-tin" id="currentTinText">Preparing file...</div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressBarFill"></div>
        </div>
    </div>

    <form id="uploadForm">
        <div class="upload-box">
            <h3>Select Excel File</h3>
            <br>
            <input type="file" id="fileInput" name="file" accept=".xlsx,.xls" required>
        </div>

        <div class="buttons">
          <!--  <button type="button" class="mobile-btn" id="mobileBtn" onclick="startExtraction('mobile')">
                 Extract Mobile Numbers
            </button>-->
            <button type="button" class="est-btn" id="estBtn" onclick="startExtraction('establishment')">
                Extract Establishment Phones
            </button>
        </div>
    </form>

    <div class="footer">
        Powered By Haron • Internal Business Tool
    </div>
</div>

<script>
let pollInterval;

async function startExtraction(type) {
    const fileInput = document.getElementById('fileInput');
    if (!fileInput.files[0]) {
        alert("Please select an Excel file first!");
        return;
    }

    const formData = new FormData();
    formData.append('file', fileInput.files[0]);

    // 1. UI updates: Disable elements and show progress section
    //document.getElementById('mobileBtn').disabled = true;
    document.getElementById('estBtn').disabled = true;
    fileInput.disabled = true;
    
    const progressContainer = document.getElementById('progressContainer');
    const statusText = document.getElementById('statusText');
    const currentTinText = document.getElementById('currentTinText');
    const progressBarFill = document.getElementById('progressBarFill');
    const progressPercent = document.getElementById('progressPercent');
    
    progressContainer.style.display = 'block';
    statusText.innerText = "Uploading & initializing...";
    progressBarFill.style.width = '0%';
    progressPercent.innerText = '0%';
    currentTinText.innerText = 'Reading document records...';

    // 2. Post file to endpoint targeting specific mode
    const endpoint = type === 'mobile' ? '/extract-mobile' : '/extract-establishments';
    
    try {
        const response = await fetch(endpoint, {
            method: 'POST',
            body: formData
        });
        
        if (!response.ok) {
                      throw new Error("Unable to start processing. Verify that the uploaded Excel file has exactly one column with the header 'TIN'.");
           }
        
        const data = await response.json();
        const taskId = data.task_id;

        // 3. Start real-time polling updates
        pollInterval = setInterval(() => checkProgress(taskId), 1000);

    } catch (error) {
        alert("An error occurred: " + error.message);
        resetUI();
    }
}

async function checkProgress(taskId) {
    try {
        const response = await fetch(`/task-status/${taskId}`);
        if (!response.ok) throw new Error("Status endpoint unreachable.");
        
        const data = await response.json();

        const statusText = document.getElementById('statusText');
        const currentTinText = document.getElementById('currentTinText');
        const progressBarFill = document.getElementById('progressBarFill');
        const progressPercent = document.getElementById('progressPercent');

        if (data.status === 'processing') {
            const percent = data.total > 0 ? Math.round((data.current / data.total) * 100) : 0;
            const failedInfo = data.failed_count > 0 ? ` (Errors/Skipped: ${data.failed_count})` : '';
            
            statusText.innerText = `Processing (${data.current}/${data.total})${failedInfo}`;
            // Turn text amber if some records are failing/skipping
            statusText.style.color = data.failed_count > 0 ? "#b45309" : "#334155"; 
            currentTinText.innerText = data.current_tin ? `Checking TIN: ${data.current_tin}` : 'Connecting...';
            progressBarFill.style.width = `${percent}%`;
            progressPercent.innerText = `${percent}%`;
        } 
        else if (data.status === 'completed') {
            clearInterval(pollInterval);
            
            if (data.ui_warning) {
                statusText.innerText = "Completed with interruptions!";
                statusText.style.color = "#dc2626"; // Red
                currentTinText.innerText = data.ui_warning;
            } else {
                statusText.innerText = "Complete!";
                statusText.style.color = "#10b981"; // Green
                currentTinText.innerText = `Finished! Downloaded items successfully.`;
            }
            
            progressBarFill.style.width = '100%';
            progressPercent.innerText = '100%';
            
            // Trigger download automatically
            window.location.href = `/download/${taskId}`;
            setTimeout(resetUI, 5000); 
        } 
        else if (data.status === 'failed') {
            // This handles the total connection drop gracefully directly in the UI
            clearInterval(pollInterval);
            statusText.innerText = "Connection Error!";
            statusText.style.color = "#dc2626"; // Error Red
            currentTinText.innerHTML = `<strong>Failed:</strong> ${data.error || "The server lost connection to the ERCA server."}`;
            
            // Keep the inputs disabled for a few seconds so they can see the error, then reset
            setTimeout(resetUI, 6000);
        }
    } catch (e) {
        console.error("Polling error:", e);
        document.getElementById('statusText').innerText = "Network Lost!";
        document.getElementById('statusText').style.color = "#dc2626";
        document.getElementById('currentTinText').innerText = "Retrying connection to your application instance...";
    }
}

function resetUI() {
    //document.getElementById('mobileBtn').disabled = false;
    document.getElementById('estBtn').disabled = false;
    document.getElementById('fileInput').disabled = false;
    document.getElementById('progressContainer').style.display = 'none';
}
</script>
