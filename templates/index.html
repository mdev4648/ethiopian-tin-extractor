<!DOCTYPE html>
<html>
<head>
    <title>Ethiopian TIN Extractor</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Inter, Arial, sans-serif;
            background:#f4f7fb;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .card{
            width:100%;
            max-width:700px;
            background:white;
            border-radius:24px;
            padding:40px;
            box-shadow:
                0 10px 25px rgba(0,0,0,.08),
                0 20px 48px rgba(0,0,0,.05);
        }

        .logo{
            width:70px;
            height:70px;
            background:#2563eb;
            border-radius:18px;
            display:flex;
            align-items:center;
            justify-content:center;
            margin:auto;
            font-size:32px;
            color:white;
        }

        h1{
            text-align:center;
            margin-top:20px;
            color:#111827;
        }

        .subtitle{
            text-align:center;
            color:#6b7280;
            margin-top:10px;
            margin-bottom:35px;
        }

        .upload-box{
            border:2px dashed #d1d5db;
            padding:30px;
            border-radius:16px;
            text-align:center;
            margin-bottom:25px;
            background:#fafafa;
        }

        input[type=file]{
            width:100%;
            padding:12px;
        }

        .buttons{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:15px;
        }

        button{
            border:none;
            border-radius:14px;
            padding:16px;
            font-size:15px;
            font-weight:600;
            cursor:pointer;
            transition:.2s;
        }

        button:hover{
            transform:translateY(-2px);
        }

        .mobile-btn{
            background:#2563eb;
            color:white;
        }

        .est-btn{
            background:#10b981;
            color:white;
        }

        .footer{
            margin-top:30px;
            text-align:center;
            color:#9ca3af;
            font-size:13px;
        }

        .stats{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:15px;
            margin-bottom:30px;
        }

        .stat{
            background:#f8fafc;
            border-radius:14px;
            padding:15px;
            text-align:center;
        }

        .stat-value{
            font-size:22px;
            font-weight:bold;
            color:#111827;
        }

        .stat-label{
            font-size:13px;
            color:#6b7280;
            margin-top:5px;
        }

        @media(max-width:700px){

            .buttons{
                grid-template-columns:1fr;
            }

            .stats{
                grid-template-columns:1fr;
            }
        }

    </style>
</head>

<body>

<div class="card">

    <div class="logo">
        🇪🇹
    </div>

    <h1>Ethiopian TIN Extractor</h1>

    <div class="subtitle">
        Extract Mobile Numbers and Establishment Phones from ERCA TIN Data
    </div>

    <div class="stats">

        <div class="stat">
            <div class="stat-value">700+</div>
            <div class="stat-label">TIN Supported</div>
        </div>

        <div class="stat">
            <div class="stat-value">CSV</div>
            <div class="stat-label">Export Format</div>
        </div>

        <div class="stat">
            <div class="stat-value">⚡</div>
            <div class="stat-label">Fast Processing</div>
        </div>

    </div>

    <form id="mobileForm"
          action="/extract-mobile"
          method="post"
          enctype="multipart/form-data">

        <div class="upload-box">

            <h3>Select Excel File</h3>

            <br>

            <input
                type="file"
                id="fileInput"
                name="file"
                accept=".xlsx,.xls"
                required>

        </div>

        <div class="buttons">

            <button
                type="submit"
                class="mobile-btn">
                📱 Extract Mobile Numbers
            </button>

            <button
                type="button"
                class="est-btn"
                onclick="submitEstablishments()">
                🏢 Extract Establishment Phones
            </button>

        </div>

    </form>

    <div class="footer">
        Built with FastAPI • Internal Business Tool
    </div>

</div>

<script>

function submitEstablishments(){

    const form =
        document.getElementById(
            "mobileForm"
        );

    form.action =
        "/extract-establishments";

    form.submit();
}

</script>

</body>
</html>
